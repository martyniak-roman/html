<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  >
  <meta

  <title>HW_2.2</title>

<style>
  *{
    padding: 0;
    margin: 0;
    box-sizing: border-box;
  }
  body{
    background-color: #FFE2C4;
  }
  .container{
    display: flex;
    justify-content: space-around;
    align-items: anchor-center;
    width: 100%;
    height: 500px;
  }
  .box{
    width: 100px;
    height: 100px;
    background-color: #FE0000;
    transition: 2s;
  }
  .box:hover{
    background-color: #333333;
   border-radius: 50%;
    transition: 2s;
  }
</style>
<body>
<div class="container">
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
</div>
</body>
</html>
